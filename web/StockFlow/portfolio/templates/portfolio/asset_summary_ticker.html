{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" >
 </head>

<style>
  .chart-container {
    width: 90%;
    max-width: 550px;
    margin: 0 auto;
  }
  #pieChart {
    width: 100%;
    height: auto;
  }
</style>

<body>
    {% load humanize %}
    <div class="container mx-4 my-2">
        <table class="table table-striped table-hover table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>銘柄</th>
                    <th>評価額合計（円）</th>
                    <th>割合</th>
                </tr>
            </thead>
            <tbody>
                {% for ticker, data in grouped.items %}
                <tr>
                    <td>{{ ticker }}</td>
                    <td>{{ data.value|floatformat:0|intcomma }}</td>
                    <td>{{ data.ratio|floatformat:2 }}%</td>
                </tr>
                {% endfor %}
            </tbody>
            <tfoot>
                <tr>
                    <th colspan="">総資産額</th>
                    <th>{{ total|floatformat:0|intcomma }}</th>
                    <th>100.00%</th>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- 円グラフ -->
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script>
  const labels = {{ labels|safe }};
  const values = {{ values|safe }};
  const total = values.reduce((a, b) => a + b, 0);

  const ctx = document.getElementById('pieChart');

  new Chart(ctx, {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: [
          '#4e79a7', '#f28e2b', '#e15759',
          '#76b7b2', '#59a14f', '#edc948',
          '#b07aa1', '#ff9da7', '#9c755f',
          '#bab0ab'
        ],
      }]
    },
    plugins: [ChartDataLabels],
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { position: 'bottom' },
        datalabels: {
          color: '#fff',
          font: { size: 12 },
          formatter: (value, ctx) => {
            const label = ctx.chart.data.labels[ctx.dataIndex];
            const percent = (value / total * 100).toFixed(1);
            return `${label}\n${value.toLocaleString()}円\n(${percent}%)`;
          }
        }
      }
    }
  });
</script>
</html>
